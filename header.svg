<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    text { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-size: 14px; dominant-baseline: middle; }
    
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    
  </style>
  <!-- Window background -->
  <rect width="100%" height="100%" fill="#1e1e1e" rx="14" ry="14"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="30" fill="#2c2c2c" rx="14" ry="14"/>
  <rect x="0" y="16" width="800" height="14" fill="#2c2c2c"/>
  <g opacity="0.55">
    <circle cx="22" cy="15" r="5.5" fill="#ff5f57"/>
    <circle cx="40" cy="15" r="5.5" fill="#febc2e"/>
    <circle cx="58" cy="15" r="5.5" fill="#28c840"/>
  </g>
  <text x="400" y="16" fill="#6a737d" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" dominant-baseline="middle">profile.json</text>

  <!-- Tab bar -->
  <rect x="0" y="30" width="800" height="32" fill="#2c2c2c"/>
  <rect x="0" y="30" width="156" height="32" fill="#252525"/>
  <!-- Active tab pill -->
  <rect x="156" y="30" width="160" height="32" fill="#1e1e1e"/>
  <rect x="156" y="30" width="160" height="2" fill="#569cd6"/>
  <text x="172" y="46" fill="#d4d4d4" font-family="ui-monospace, monospace" font-size="11" dominant-baseline="middle">profile.json</text>
  <text x="300" y="46" fill="#6a737d" font-family="ui-monospace, monospace" font-size="11" dominant-baseline="middle">×</text>

  <!-- Sidebar -->
  <rect x="0" y="62" width="156" height="238" fill="#252525"/>
  <text x="20" y="74" fill="#6a737d" font-family="ui-monospace, monospace" font-size="9" letter-spacing="1.2" dominant-baseline="middle">EXPLORER</text>
  <rect x="0" y="86" width="156" height="22" fill="#d4d4d4" fill-opacity="0.06"/><text x="20" y="100" fill="#d4d4d4" font-size="12" dominant-baseline="middle">header.svg</text>
  <text x="20" y="122" fill="#6a737d" font-size="12" dominant-baseline="middle">about.svg</text>
  <text x="20" y="144" fill="#6a737d" font-size="12" dominant-baseline="middle">skills.svg</text>
  <text x="20" y="166" fill="#6a737d" font-size="12" dominant-baseline="middle">gh-stats.svg</text>
  <text x="20" y="188" fill="#6a737d" font-size="12" dominant-baseline="middle">footer.svg</text>
  <!-- Vertical divider between sidebar and editor -->
  <line x1="156" y1="62" x2="156" y2="300" stroke="#353535" stroke-width="1"/>

  <!-- Editor body -->
  <g class="cl0">
    <text x="184" y="132" fill="#6a737d" text-anchor="end" font-size="12">1</text>
    <g transform="translate(194 132)"><text x="0" fill="#d4d4d4">{</text></g>
  </g>
  <g class="cl1">
    <text x="184" y="154" fill="#6a737d" text-anchor="end" font-size="12">2</text>
    <g transform="translate(194 154)"><text x="16.8" fill="#569cd6">&quot;name&quot;</text><text x="67.2" fill="#d4d4d4">:</text><text x="84" fill="#ce9178">&quot;Ryan Polasky&quot;</text><text x="201.60000000000002" fill="#d4d4d4">,</text></g>
  </g>
  <g class="cl2">
    <text x="184" y="176" fill="#6a737d" text-anchor="end" font-size="12">3</text>
    <g transform="translate(194 176)"><text x="16.8" fill="#569cd6">&quot;role&quot;</text><text x="67.2" fill="#d4d4d4">:</text><text x="84" fill="#ce9178">&quot;Software Engineer&quot;</text><text x="243.60000000000002" fill="#d4d4d4">,</text></g>
  </g>
  <g class="cl3">
    <text x="184" y="198" fill="#6a737d" text-anchor="end" font-size="12">4</text>
    <g transform="translate(194 198)"><text x="16.8" fill="#569cd6">&quot;org&quot;</text><text x="58.800000000000004" fill="#d4d4d4">:</text><text x="75.60000000000001" fill="#ce9178">&quot;Apple&quot;</text><text x="134.4" fill="#d4d4d4">,</text></g>
  </g>
  <g class="cl4">
    <text x="184" y="220" fill="#6a737d" text-anchor="end" font-size="12">5</text>
    <g transform="translate(194 220)"><text x="16.8" fill="#569cd6">&quot;location&quot;</text><text x="100.80000000000001" fill="#d4d4d4">:</text><text x="117.60000000000001" fill="#ce9178">&quot;North Dakota&quot;</text><text x="235.20000000000002" fill="#d4d4d4">,</text></g>
  </g>
  <g class="cl5">
    <text x="184" y="242" fill="#6a737d" text-anchor="end" font-size="12">6</text>
    <g transform="translate(194 242)"><text x="16.8" fill="#569cd6">&quot;tagline&quot;</text><text x="92.4" fill="#d4d4d4">:</text><text x="109.2" fill="#ce9178">&quot;I like building fun stuff :)&quot;</text></g>
  </g>
  <g class="cl6">
    <text x="184" y="264" fill="#6a737d" text-anchor="end" font-size="12">7</text>
    <g transform="translate(194 264)"><text x="0" fill="#d4d4d4">}</text></g>
  </g>

  <!-- Blinking cursor at end of last value line -->
  <rect x="555.2" y="230" width="2" height="17" fill="#d4d4d4" style="animation: blink 1s steps(1) infinite"/>
</svg>